name: Build & Test

# Builds and tests the IUUT solution on every PR and every push to main.
# Runs on windows-latest because IUUT.App targets net8.0-windows (WPF).
#
# Gates (all must pass — see .agent/DEFINITION_OF_DONE.md §1, §3 and
# .agent/CODE_STYLE.md §14):
#   1. Restore + build with TreatWarningsAsErrors (analyzers gate via Directory.Build.props)
#   2. dotnet test (xUnit)
#   3. dotnet format --verify-no-changes (style gate)
#
# The target framework is net8.0 (locked decision Q1, master doc §6.1). We
# install the .NET 8 SDK explicitly so the net8.0 targeting pack is present;
# global.json rollForward=latestMajor lets a newer runner SDK build it too.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  # Mapped from the repo secret so the coverage-upload step can gate on its
  # presence (you cannot reference `secrets.*` directly in a step `if:`).
  # Until the secret is set, the upload step skips and the build stays green.
  CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, test, format
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        # Restore in the Release configuration so IUUT.App's Release-only
        # conditional RuntimeIdentifier (win-x64) is part of the restored
        # assets. Without this, the Release build below fails with NETSDK1047
        # ("Assets file ... doesn't have a target for net8.0-windows/win-x64")
        # because the default restore runs in Debug, where the RID is inactive.
        run: dotnet restore IcarusUltimateUtilityTool.sln -p:Configuration=Release

      - name: Build (Release, warnings as errors)
        run: dotnet build IcarusUltimateUtilityTool.sln -c Release --no-restore

      - name: Test
        run: dotnet test IcarusUltimateUtilityTool.sln -c Release --no-build --logger "console;verbosity=minimal" --collect:"XPlat Code Coverage"

      - name: Verify formatting (dotnet format)
        run: dotnet format IcarusUltimateUtilityTool.sln --verify-no-changes --no-restore

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: "**/TestResults/**/coverage.cobertura.xml"
          if-no-files-found: ignore
          retention-days: 14

      # Sends the cobertura coverage report to Codacy so its quality gate has
      # real coverage data. Skipped (build stays green) until the repo secret
      # CODACY_PROJECT_TOKEN is configured. Without coverage, Codacy reports
      # "Not up to standards" on every PR — including changes it does not even
      # analyse (e.g. .github/** is excluded in .codacy.yaml).
      - name: Upload coverage to Codacy
        if: ${{ always() && env.CODACY_PROJECT_TOKEN != '' }}
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ env.CODACY_PROJECT_TOKEN }}
          coverage-reports: "**/TestResults/**/coverage.cobertura.xml"
